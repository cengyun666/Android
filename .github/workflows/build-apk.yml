name: Build Debug APK

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest
    env:
      ANDROID_HOME: /opt/android-sdk
      GRADLE_OPTS: "-Xmx6g -XX:+UseParallelGC"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Gradle 8.5
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.5-bin.zip -P /tmp
          unzip -q /tmp/gradle-8.5-bin.zip -d /opt
          echo "GRADLE_HOME=/opt/gradle-8.5" >> $GITHUB_ENV
          echo "/opt/gradle-8.5/bin" >> $GITHUB_PATH

      - name: Install Android SDK
        run: |
          mkdir -p $ANDROID_HOME
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -P /tmp
          unzip -q /tmp/commandlinetools-linux-11076708_latest.zip -d $ANDROID_HOME/cmdline-tools
          mv $ANDROID_HOME/cmdline-tools/cmdline-tools $ANDROID_HOME/cmdline-tools/latest
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          echo "$ANDROID_HOME/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$ANDROID_HOME/platform-tools" >> $GITHUB_PATH

      - name: Accept SDK licenses
        run: |
          yes | sdkmanager --licenses || true

      - name: Install required SDK components
        run: |
          sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools" --sdk_root=$ANDROID_HOME

      - name: Clean build and rebuild
        run: |
          gradle clean assembleDebug --no-daemon -x lint 2>&1 | tail -200

      - name: Debug - List all files in detail
        run: |
          echo "=== CURRENT DIRECTORY ==="
          pwd
          echo ""
          echo "=== GRADLE BUILD OUTPUT ==="
          ls -la build/ 2>/dev/null || echo "Root build dir not found"
          echo ""
          echo "=== APP BUILD OUTPUT ==="
          ls -la app/build/ 2>/dev/null || echo "App build dir not found"
          echo ""
          echo "=== APP BUILD OUTPUTS ==="
          ls -la app/build/outputs/ 2>/dev/null || echo "Outputs dir not found"
          echo ""
          echo "=== APK FILES ==="
          find . -name "*.apk" -type f 2>/dev/null || echo "NO APK FILES FOUND"
          echo ""
          echo "=== ALL FILES IN APP BUILD ==="
          find app/build -type f 2>/dev/null | head -30

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: |
            **/*.apk
          retention-days: 30