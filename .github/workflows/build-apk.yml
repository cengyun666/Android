name: Build Debug APK

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest
    env:
      GRADLE_OPTS: "-Xmx4g -XX:+UseParallelGC"
      JAVA_TOOL_OPTIONS: "-Xmx4g"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Gradle 8.5
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.5-bin.zip -P /tmp
          unzip -q /tmp/gradle-8.5-bin.zip -d /opt
          echo "GRADLE_HOME=/opt/gradle-8.5" >> $GITHUB_ENV
          echo "/opt/gradle-8.5/bin" >> $GITHUB_PATH

      - name: Install Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 34
          build-tools: 34.0.0
          accept-android-sdk-licenses: true

      - name: Build Debug APK
        run: gradle assembleDebug --no-daemon

      - name: List build outputs
        run: find app/build -name "*.apk" -type f 2>/dev/null || echo "No APK files found"

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: |
            app/build/outputs/apk/**/*.apk
            app/build/outputs/bundle/**/*.aab
          retention-days: 30