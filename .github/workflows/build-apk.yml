name: Build Debug APK

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest
    env:
      ANDROID_HOME: /opt/android-sdk
      GRADLE_OPTS: "-Xmx6g -XX:+UseParallelGC"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Gradle 8.5
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.5-bin.zip -P /tmp
          unzip -q /tmp/gradle-8.5-bin.zip -d /opt
          echo "GRADLE_HOME=/opt/gradle-8.5" >> $GITHUB_ENV
          echo "/opt/gradle-8.5/bin" >> $GITHUB_PATH

      - name: Install Android SDK
        run: |
          mkdir -p $ANDROID_HOME
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -P /tmp
          unzip -q /tmp/commandlinetools-linux-11076708_latest.zip -d $ANDROID_HOME/cmdline-tools
          mv $ANDROID_HOME/cmdline-tools/cmdline-tools $ANDROID_HOME/cmdline-tools/latest
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          echo "$ANDROID_HOME/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$ANDROID_HOME/platform-tools" >> $GITHUB_PATH

      - name: Accept SDK licenses
        run: |
          yes | sdkmanager --licenses || true

      - name: Install required SDK components
        run: |
          sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools" --sdk_root=$ANDROID_HOME

      - name: Run assembleDebug with full output
        run: |
          echo "=== RUNNING GRADLE ASSEMBLEDEBUG ==="
          gradle assembleDebug --no-daemon -x lint 2>&1

      - name: Debug - Full directory listing
        run: |
          echo "=== FULL DEBUG INFORMATION ==="
          echo ""
          echo "1. Current directory:"
          pwd
          echo ""
          echo "2. Root directory:"
          ls -la
          echo ""
          echo "3. Check if app/build exists:"
          ls -la app/build/ 2>/dev/null || echo "app/build NOT FOUND"
          echo ""
          echo "4. List all files in app/build:"
          find app/build -type f 2>/dev/null | head -50 || echo "No files in app/build"
          echo ""
          echo "5. Search for APK files everywhere:"
          find / -name "*.apk" -type f 2>/dev/null | head -20 || echo "NO APK FILES FOUND ANYWHERE"
          echo ""
          echo "6. Check gradle wrapper:"
          ls -la gradlew* 2>/dev/null || echo "No gradle wrapper"

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: |
            **/*.apk
          retention-days: 30