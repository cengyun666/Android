name: Build Debug APK

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest
    env:
      ANDROID_HOME: /opt/android-sdk
      GRADLE_OPTS: "-Xmx6g -XX:+UseParallelGC"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Gradle 8.5
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.5-bin.zip -P /tmp
          unzip -q /tmp/gradle-8.5-bin.zip -d /opt
          echo "GRADLE_HOME=/opt/gradle-8.5" >> $GITHUB_ENV
          echo "/opt/gradle-8.5/bin" >> $GITHUB_PATH
          echo "=== GRADLE VERSION ==="
          gradle --version

      - name: Install Android SDK
        run: |
          mkdir -p $ANDROID_HOME
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -P /tmp
          unzip -q /tmp/commandlinetools-linux-11076708_latest.zip -d $ANDROID_HOME/cmdline-tools
          mv $ANDROID_HOME/cmdline-tools/cmdline-tools $ANDROID_HOME/cmdline-tools/latest
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          echo "$ANDROID_HOME/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$ANDROID_HOME/platform-tools" >> $GITHUB_PATH

      - name: Accept SDK licenses
        run: |
          yes | sdkmanager --licenses || true

      - name: Install required SDK components
        run: |
          echo "=== INSTALLING SDK COMPONENTS ==="
          sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools" --sdk_root=$ANDROID_HOME

      - name: Show environment before build
        run: |
          echo "=== ENVIRONMENT VARIABLES ==="
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "JAVA_HOME=$JAVA_HOME"
          echo "GRADLE_HOME=$GRADLE_HOME"
          echo ""
          echo "=== PATH ==="
          echo $PATH
          echo ""
          echo "=== ANDROID SDK BUILD-TOOLS ==="
          ls $ANDROID_HOME/build-tools/ 2>/dev/null || echo "No build-tools found"

      - name: Build with error capture
        id: build_step
        continue-on-error: true
        run: |
          echo "=== STARTING BUILD ==="
          gradle assembleDebug --no-daemon -x lint 2>&1 | tee /tmp/build.log
          exit ${PIPESTATUS[0]}

      - name: Show full build log on failure
        if: failure()
        run: |
          echo "=== FULL BUILD LOG (LAST 200 LINES) ==="
          tail -200 /tmp/build.log

      - name: Debug info regardless of outcome
        run: |
          echo "=== DEBUG INFORMATION ==="
          echo "Current directory: $(pwd)"
          echo ""
          echo "=== Files in app/build ==="
          find app/build -type f 2>/dev/null | head -30 || echo "No files in app/build"
          echo ""
          echo "=== APK files found ==="
          find . -name "*.apk" -type f 2>/dev/null || echo "NO APK FILES"

      - name: Upload Debug APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: |
            **/*.apk
          retention-days: 30