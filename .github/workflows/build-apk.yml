name: Build Debug APK

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest
    container:
      image: budtmo/docker-android:emulator_34
      options: --user root

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Debug APK
        run: |
          cd /github/workspace
          ./gradlew assembleDebug --no-daemon -x lint 2>&1

      - name: List all build outputs
        if: success() || failure()
        run: |
          echo "=== Listing all files in build directory ==="
          find /github/workspace -name "*.apk" -type f 2>/dev/null || echo "No APK files found"

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: |
            /github/workspace/app/build/outputs/apk/**/*.apk
          retention-days: 30